name: gozolt_driver
description: "Gozolt Driver App - Born in Malta, Loved by Europe"
publish_to: 'none'
version: 1.0.1+30

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Networkin
  dio: ^5.7.0

  # Secure Storage
  flutter_secure_storage: ^9.2.4

  # UI Utilities
  smooth_page_indicator: ^1.2.0+3
  cupertino_icons: ^1.0.8

  # Serialization
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4

  # Internationalization
  intl: any

  # URL Launcher
  url_launcher: ^6.3.1

  # Camera / Image Picker
  image_picker: ^1.1.2
  file_picker: ^8.1.7

  # Audio
  just_audio: ^0.9.40

  # Google Maps & Location
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  socket_io_client: ^3.1.4

  # Firebase
  firebase_core: ^3.11.0
  firebase_auth: ^5.5.0
  firebase_messaging: ^15.2.10

  # Payments
  flutter_stripe: ^10.1.1

  # UI Extensions
  cached_network_image: ^3.4.1
  flutter_svg: ^2.1.0
  pin_code_fields: ^9.4.0
  google_fonts: ^8.1.0
  image_cropper: ^12.2.1
  flutter_local_notifications: ^22.0.1
  package_info_plus: ^9.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

  # Code Generation
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  json_serializable: ^6.8.0
  freezed: ^2.4.1
  flutter_native_splash: ^2.4.8

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/Gozolt_Driver_Icon.png"
  image_path_ios: "assets/images/Gozolt_Driver_Icon_iOS.png"
  adaptive_icon_background: "#092646"
  adaptive_icon_foreground: "assets/images/Gozolt_Driver_Icon.png"
  adaptive_icon_foreground_inset: 20
  remove_alpha_ios: true

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/map/

flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#FFFFFF"
  image: "assets/images/Gozolt_Driver_Splash_Icon.png"
  image_dark: "assets/images/Gozolt_Driver_Splash_Icon.png"
  android_12:
    color: "#FFFFFF"
    color_dark: "#FFFFFF"
    image: "assets/images/Gozolt_Driver_Splash_Icon.png"
    image_dark: "assets/images/Gozolt_Driver_Splash_Icon.png"
