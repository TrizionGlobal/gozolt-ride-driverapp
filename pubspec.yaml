name: gozolt_driver
description: "Gozolt Driver App - Born in Malta, Loved by Europe"
publish_to: 'none'
version: 1.0.0+101

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0

  # Secure Storage
  flutter_secure_storage: ^9.2.4

  # UI Utilities
  smooth_page_indicator: ^1.2.0+3
  cupertino_icons: ^1.0.8

  # Serialization
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4

  # Internationalization
  intl: any

  # URL Launcher
  url_launcher: ^6.3.1

  # Camera / Image Picker
  image_picker: ^1.1.2

  # Audio
  just_audio: ^0.9.40

  # Google Maps & Location
  google_maps_flutter: ^2.10.0
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  socket_io_client: ^3.1.4

  # Firebase
  firebase_core: ^3.11.0
  firebase_auth: ^5.5.0
  firebase_messaging: ^15.2.10

  # Payments
  flutter_stripe: ^10.1.1

  # UI Extensions
  cached_network_image: ^3.4.1
  flutter_svg: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

  # Code Generation
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  json_serializable: ^6.8.0
  freezed: ^2.4.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/Gozolt_Driver_Icon.png"
  adaptive_icon_background: "#1A1A2E"
  adaptive_icon_foreground: "assets/images/Gozolt_Driver_Icon.png"
  remove_alpha_ios: true

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/
    - assets/map/
